# Quantumult X ImageTwist 图床穿透 Rewrite 配置 
# ==========================================================
# 仅保留用户提供的规则
# ==========================================================

#[rewrite_local]

# === ImageTwist ===
^https?://img(\d+)\.imagetwist\.com/th/(\d+)/(.+)\.jpg$ url 302 https://img$1.imagetwist.com/i/$2/$3.jpg
^https?://img(\d+)\.imagetwist\.com/th/(\d+)/(.+)\.jpeg$ url 302 https://img$1.imagetwist.com/i/$2/$3.jpeg

#[mitm]
hostname = img*.imagetwist.com
