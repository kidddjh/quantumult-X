hostname = *.imagetwist.com, planetsuzy.org, www.planetsuzy.org

# [逻辑 1] 修复论坛页面里的预览图链接 (解决 .jpeg / 路径错误)
^https?://(www\.)?planetsuzy\.org/showthread\.php url-script-response-body https://raw.githubusercontent.com/kidddjh/quantumult-X/refs/heads/main/imagetwist.js

# [逻辑 2] 拦截所有 ImageTwist 请求 (处理 th->i 跳转和 Referer 注入)
^https?://(?:img|s)\d+\.imagetwist\.com/(th|i)/ url-script-request https://raw.githubusercontent.com/kidddjh/quantumult-X/refs/heads/main/imagetwist.js