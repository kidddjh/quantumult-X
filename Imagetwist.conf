# ==========================================
# ImageTwist 高清穿透 & 防盗链绕过
# 适用站点: PlanetSuzy, PornDL 等使用 ImageTwist 的论坛
# ==========================================

#[rewrite_local]
# 1. 路径穿透：将缩略图路径 /th/ 自动转换为原图路径 /i/
# 示例: img69.imagetwist.com/th/123/abc.jpg -> img69.imagetwist.com/i/123/abc.jpg
^https?://(img\d+\.imagetwist\.com)/th/(.+) url 302 https://$1/i/$2

# 2. 伪造引用页：为所有原图请求添加 Referer，解决直接访问导致的 403 Forbidden 或加载失败
# 使用 vacy 模式：先删除原有 Referer (如果有) 再添加正确的 Referer
^https?://img\d+\.imagetwist\.com/i/ url-request-header ^Referer:.+ vacy Referer: https://imagetwist.com/

#[mitm]
# 必须包含所有图片服务器子域名
hostname = img*.imagetwist.com