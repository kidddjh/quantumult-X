# ==========================================================
# 规则名称: ImageTwist 家族高清穿透 (302 跳转 + Header 伪造)
# 适用图床: ImageTwist, ImgFlare, ImgFile, ImgDrive, ImgRock, ImgBolt, Zipero
# 脚本作者: kidddjh
# ==========================================================

#[rewrite_local]
# 1. 第一步：将缩略图 (/th/) 自动重定向为高清原图 (/i/)
^https?:\/\/((?:img|s|cdn)\d*\.(?:imagetwist|imgflare|imgfile|imgdrive|imgrock|imgbolt|zipero)\.(?:com|net|site))\/th\/(.+)$ url 302 https://$1/i/$2

# 2. 第二步：请求高清原图时，执行脚本伪造 Referer & UA 绕过 403 封锁
^https?:\/\/((?:img|s|cdn)\d*\.(?:imagetwist|imgflare|imgfile|imgdrive|imgrock|imgbolt|zipero)\.(?:com|net|site))\/i\/.+$ url script-request-header https://raw.githubusercontent.com/kidddjh/quantumult-X/refs/heads/main/imagetwist.js

#[mitm]
hostname = img*.imagetwist.com, s*.imagetwist.com, cdn*.imagetwist.com, imgflare.com, s*.imgflare.com, cdn*.imgflare.com, imgfile.com, s*.imgfile.com, cdn*.imgfile.com, imgdrive.net, s*.imgdrive.net, cdn*.imgdrive.net, imgrock.net, s*.imgrock.net, cdn*.imgrock.net, imgbolt.com, s*.imgbolt.com, cdn*.imgbolt.com, zipero.site, s*.zipero.site, cdn*.zipero.site