hostname = *.imagetwist.com, www.planetsuzy.org

# [1] 论坛页面预处理：直接把论坛里的查看页链接改成图片直连 (需要 Response Body 重写)
# 这一步最关键，能让你点击预览图时直接看到图，而不是广告页
^http://www\.planetsuzy\.org/showthread\.php url-script-response-body https://raw.githubusercontent.com/kidddjh/quantumult-X/refs/heads/main/imagetwist_link_fix.js

# [2] 缩略图穿透 (th -> i)
^https?://((?:img|s)\d+\.imagetwist\.com)/th/(.+) url 302 https://$1/i/$2

# [3] 图片防盗链绕过
^https?://(?:img|s)\d+\.imagetwist\.com/i/ url-script-request https://raw.githubusercontent.com/kidddjh/quantumult-X/refs/heads/main/imagetwist.js