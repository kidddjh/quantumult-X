[rewrite_local]
# 1. 路径穿透：缩略图(th)转原图(i)
^https?://img\d+\.imagetwist\.com/th/(.+) url 302 https://$1/i/$2

# 2. 修改 Header：直接强制覆盖 Referer
# 注意：语法为 [URL正则] url-request-header [Header内容]
^https?://img\d+\.imagetwist\.com/i/ url-request-header Referer: https://imagetwist.com/

[mitm]
# 建议使用通配符前缀，确保覆盖所有子服务器
hostname = *.imagetwist.com