#[rewrite_local]
# PicState: 缩略图穿透到原图 (涵盖 small/medium/large 等不同规格)
^https?://(?:www\.)?picstate\.com/thumbs/(?:small|medium|large|vsmall)/(.+) url 302 https://picstate.com/files/$1

# PicState: 查看页跳转至直连 (尝试将查看 ID 转换为文件路径)
^https?://(?:www\.)?picstate\.com/view/full/([a-zA-Z0-9_]+) url 302 https://picstate.com/files/$1

#[mitm]
hostname = picstate.com