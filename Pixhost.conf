# Quantumult X Pixhost 图床穿透 Rewrite 配置 
# ==========================================================
# 仅保留用户提供的规则
# ==========================================================

# ── PixHost 图床穿透（同时支持 .to 与 .cc 域名） ────────────────────────

#[rewrite_local]
# 1) .to 域名（原始规则）
^https?://(t|img)(\d*)\.pixhost\.to/(thumbs|show)/(\d+)/(.+)$ url 302 https://img$2.pixhost.to/images/$4/$5

# 2) .cc 域名（新增规则）
^https?://(t|img)(\d*)\.pixhost\.cc/(thumbs|show)/(\d+)/(.+)$ url 302 https://img$2.pixhost.cc/images/$4/$5

#[mitm]
# 同时拦截两种域名的请求
hostname = t*.pixhost.to, img*.pixhost.to, t*.pixhost.cc, img*.pixhost.cc