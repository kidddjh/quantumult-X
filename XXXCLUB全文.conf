[rewrite_local]
# 1. XXXClub RSS 全文内容改写 (将干巴巴的标题变为图文并茂)
^https?:\/\/xxxclub\.to\/feed\/.*\.xml url script-response-body https://raw.githubusercontent.com/kidddjh/quantumult-X/refs/heads/main/xxxclub.js

# 2. 修复图片显示 (针对 imgxclub.com 和 imgtraffic.com 的防盗链拦截)
^https?:\/\/(imgxclub\.com|imgtraffic\.com)\/ url script-request-header https://raw.githubusercontent.com/kidddjh/quantumult-X/refs/heads/main/fix-referer.js

[mitm]
# 授权相关域名的 HTTPS 解密
hostname = %APPEND% xxxclub.to, imgxclub.com, imgtraffic.com