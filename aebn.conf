# AEBN 图片高分辨率重写配置文件
# 适用于 Quantumult X / Surge / Loon
# 功能：自动将 AEBN 缩略图请求重写为原始分辨率

#[rewrite_local]
# ── AEBN 图床统一穿透规则 ────────────────────────────────────────
# 前/后封图（/dis/i/… + 任意查询参数） → 去掉前缀和全部查询参数
^https?://pic\.aebn\.net/dis/i/([^?]+)\?.* url 302 https://pic.aebn.net/$1

# 场景截图（/dis/t/… + 任意查询参数） → 保留 /dis/t/ 前缀，仅去掉查询参数
^https?://pic\.aebn\.net/dis/t/([^?]+)\?.* url 302 https://pic.aebn.net/dis/t/$1

#[mitm]
hostname = pic.aebn.net