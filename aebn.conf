# AEBN 图片高分辨率重写配置文件
# 适用于 Quantumult X / Surge / Loon
# 功能：自动将 AEBN 缩略图请求重写为原始分辨率

#[rewrite_local]
# 封面图：去掉 s=220w 等尺寸参数，强制获取原图
^https?://pic\.aebn\.net/dis/i/Stream/Movie/BoxCovers/([^?]+)\?.*$ url 302 https://pic.aebn.net/dis/i/Stream/Movie/BoxCovers/$1

# 场景截图帧：去掉 s=180h 等尺寸参数，强制获取 1920x1080 原图
^https?://pic\.aebn\.net/dis/t/(\d+)/(\d+)_([0-9]+)\.jpg\?.*$ url 302 https://pic.aebn.net/dis/t/$1/$2_$3.jpg

# 其他/general AEBN 缩略图去参
^https?://pic\.aebn\.net/(.+)\?s=[0-9]+[wh]$ url 302 https://pic.aebn.net/$1

#[mitm]
hostname = pic.aebn.net