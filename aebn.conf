# Quantumult X AEBN 图床穿透 Rewrite 配置

#[rewrite_local]
# 1）封面图（前/后封）：去掉 /dis/i/ 前缀和 ?s= 参数
^https?://pic\.aebn\.net/dis/i/([^?]+)\?s=\d+w url 302 https://pic.aebn.net/$1

# 2）场景截图：保留 /dis/t/ 前缀，去掉 ?s= 参数
^https?://pic\.aebn\.net/dis/t/([^?]+)\?s=\d+h url 302 https://pic.aebn.net/dis/t/$1

#[mitm]
hostname = pic.aebn.net