# Quantumult X 图床穿透 Rewrite 配置 (用户精简版)
# ==========================================================
# 仅保留用户提供的规则
# ==========================================================

[rewrite_local]

# === ImageVenue ===
^https?://cdn-thumbs\.imagevenue\.com/(.+)_t\.(jpg|png|jpeg)$ url 302 https://cdn-images.imagevenue.com/$1.$2

# === Pimpandhost / Filesor ===
^https?://(ist\d+-\d+\.filesor\.com/pimpandhost\.com/.+)_[ml]\.jpg$ url 302 https://$1.jpg

# === PicState ===
^https?://picstate\.com/thumbs/small/(.+)$ url 302 https://picstate.com/files/$1

# === ImgNova ===
^https?://imgnova\.cc/i/(.+)_t\.jpg$ url 302 https://imgnova.cc/i/$1.jpg

# === PixHost ===
^https?://(t|img)(\d*)\.pixhost\.to/(thumbs|show)/(\d+)/(.+)$ url 302 https://img$2.pixhost.to/images/$4/$5

# === ImageBam ===
^https?://www\.imagebam\.com/view/([a-zA-Z0-9]+)$ url 302 https://www.imagebam.com/images/$1

# === ImgBox ===
^https?://imgbox\.com/(.+)_thumb\.jpg$ url 302 https://imgbox.com/$1.jpg
^https?://(\d+)\.imgbox\.com/(\w+)_t\.(jpg|png)$ url 302 https://$1.imgbox.com/$2.$3

# === PostImg ===
^https?://postimg\.cc/([a-zA-Z0-9]+)$ url 302 https://i.postimg.cc/$1/image.jpg

# === Pixiv ===
^https?://i\.pximg\.net/img-master/img/(.+)_master1200\.(jpg|png|jpeg)$ url 302 https://i.pximg.net/img-original/img/$1.$2

# === 14xpics ===
^https?://14xpics\.com/images/.*/([a-zA-Z0-9]+)\.th\.jpg$ url 302 https://14xpics.com/image/$1

[mitm]
hostname = cdn-thumbs.imagevenue.com, cdn-images.imagevenue.com, ist*-*.filesor.com, picstate.com, imgnova.cc, t*.pixhost.to, img*.pixhost.to, www.imagebam.com, imgbox.com, *.imgbox.com, postimg.cc, i.postimg.cc, i.pximg.net, 14xpics.com
