# Quantumult X 图床穿透 Rewrite 配置 (清理版 v2.1)
# ==========================================================
# 更新日期: 2026-05-18
# 修复: PixHost, ImageVenue
# 剔除: TinyPic, PicState, ImgTraffic, Pilot007 等已失效图床
# ==========================================================

[rewrite_local]

# === PixHost ===
^https?://(t|img)(\d*)\.pixhost\.to/(thumbs|show)/(\d+)/(.+)$ url 302 https://img$2.pixhost.to/images/$4/$5

# === ImageTwist 家族 ===
^https?://((?:img|s|cdn)\d*\.(?:imagetwist|imgdrive)\.(?:com|net|site))/th/(.+)$ url 302 https://$1/i/$2

# === Pimpandhost / Filesor ===
^https?://(ist\d+-\d+\.filesor\.com/pimpandhost\.com/.+)_[ml]\.jpg$ url 302 https://$1.jpg

# === ImageVenue ===
^https?://cdn-thumbs\.imagevenue\.com/(.+)_t\.(jpg|png|jpeg)$ url 302 https://cdn-images.imagevenue.com/$1.$2
^https?://cdn-thumbs\.imagevenue\.com/(.+)_thumb\.(jpg|png|jpeg)$ url 302 https://cdn-images.imagevenue.com/$1.$2
^https?://(img\d+\.imagevenue\.com/.+)_t\.(jpg|png|jpeg)$ url 302 https://$1.$2
^https?://(img\d+\.imagevenue\.com/.+)_thumb\.(jpg|png|jpeg)$ url 302 https://$1.$2
^https?://cdn-images\.imagevenue\.com/(.+)_t\.(jpg|png|jpeg)$ url 302 https://cdn-images.imagevenue.com/$1.$2
^https?://cdn-images\.imagevenue\.com/(.+)_thumb\.(jpg|png|jpeg)$ url 302 https://cdn-images.imagevenue.com/$1.$2
^https?://(?:www\.)?imagevenue\.com/(.+)_t\.(jpg|png|jpeg)$ url 302 https://imagevenue.com/$1.$2
^https?://(?:www\.)?imagevenue\.com/(.+)_thumb\.(jpg|png|jpeg)$ url 302 https://imagevenue.com/$1.$2

# === Imgur ===
^https?://i\.imgur\.com/([a-zA-Z0-9]+)[slmth]\.(jpg|png|gif|jpeg)$ url 302 https://i.imgur.com/$1.$2

# === Reddit ===
^https?://preview\.redd\.it/(.+)$ url 302 https://i.redd.it/$1

# === Flickr ===
^https?://live\.staticflickr\.com/(\d+)/(\d+)_([a-z0-9]+)_[a-z]\.jpg$ url 302 https://live.staticflickr.com/$1/$2_$3_b.jpg

# === Imgbox.com ===
^https?://imgbox\.com/(.+)_thumb\.jpg$ url 302 https://imgbox.com/$1.jpg

# === Catbox.moe ===
^https?://(?:files\.)?catbox\.moe/(.+)_thumb\.jpg$ url 302 https://catbox.moe/$1.jpg
^https?://(?:thumb|preview)\.catbox\.moe/(.+)\.jpg$ url 302 https://catbox.moe/$1.jpg

# === Smutty.com ===
^https?://(?:thumbs\.)?smutty\.com/(.+)_thumb\.jpg$ url 302 https://smutty.com/$1.jpg

# === Erome.com ===
^https?://(?:thumbs\.)?erome\.com/(.+)_thumb\.jpg$ url 302 https://erome.com/$1.jpg

# === Xhamster ===
^https?://(?:(?:thumb|preview)\.)?xhamster\.com/(.+)_thumb\.jpg$ url 302 https://xhamster.com/$1.jpg

# === Pornhub / Spankbang / Xvideos (多尺寸优化) ===
^https?://(?:ci|ps)\.phncdn\.com/(.+)_(?:120x68|160x90|210x120)\.jpg$ url 302 https://ci.phncdn.com/$1_500x281.jpg
^https?://thumbs\.spankbang\.com/(.+)_(?:120x68|160x90|210x120)\.jpg$ url 302 https://thumbs.spankbang.com/$1_500x281.jpg
^https?://(?:cdn-thumb|thumbs)\.xvideos\.com/(.+)_(?:120x68|160x90|210x120)\.jpg$ url 302 https://cdn-thumb.xvideos.com/$1_500x281.jpg

# === 直播站 (Chaturbate/Stripchat/Bongacams) ===
^https?://(?:thumbs\.)?chaturbate\.com/(.+)_thumb\.jpg$ url 302 https://chaturbate.com/$1.jpg
^https?://(?:thumbs\.)?stripchat\.com/(.+)_thumb\.jpg$ url 302 https://stripchat.com/$1.jpg
^https?://(?:thumbs\.)?bongacams\.com/(.+)_thumb\.jpg$ url 302 https://bongacams.com/$1.jpg

# === 动画/Hentai (Gelbooru/Danbooru/Rule34) ===
^https?://(?:thumbs\.)?gelbooru\.com/(.+)_thumb\.jpg$ url 302 https://gelbooru.com/$1.jpg
^https?://(?:thumbs\.)?danbooru\.com/(.+)_thumb\.jpg$ url 302 https://danbooru.com/$1.jpg
^https?://(?:thumbs\.)?rule34\.xxx/(.+)_thumb\.jpg$ url 302 https://rule34.xxx/$1.jpg

# === 日本成人站 (FANZA/Javdb/Javbus) ===
^https?://(?:thumb|preview)\.(?:dmm\.co\.jp|fanza\.com)/(.+)_thumb\.jpg$ url 302 https://fanza.com/$1.jpg
^https?://(?:thumb|preview)\.javdb\.(?:com|info)/(.+)_thumb\.jpg$ url 302 https://javdb.com/$1.jpg
^https?://(?:thumb|preview)\.javbus\.com/(.+)_thumb\.jpg$ url 302 https://javbus.com/$1.jpg

[mitm]
hostname = t*.pixhost.to, img*.pixhost.to, img*.imagetwist.com, s*.imagetwist.com, cdn*.imagetwist.com, imgdrive.net, *.imgbox.com, ist*-*.filesor.com, cdn-thumbs.imagevenue.com, cdn-images.imagevenue.com, img*.imagevenue.com, www.imagevenue.com, i.imgur.com, preview.redd.it, i.redd.it, live.staticflickr.com, catbox.moe, *.catbox.moe, thumbs.smutty.com, smutty.com, thumbs.erome.com, erome.com, *.xhamster.com, ci.phncdn.com, ps.phncdn.com, thumbs.spankbang.com, *.xvideos.com, *.chaturbate.com, *.stripchat.com, *.bongacams.com, *.gelbooru.com, *.danbooru.com, *.rule34.xxx, *.fanza.com, *.dmm.co.jp, *.javdb.com, *.javdb.info, *.javbus.com
