# Quantumult X 图床穿透 Rewrite 配置 (清理版 v2)
# ==========================================================
# 清理日期: 2026-05-18
# 修复: PixHost正则(支持无t[N].前缀格式)
# 逻辑: 自动将所有缩略图/预览图还原为高清原图
# 使用: Quantumult X -> 侧边栏 -> Rewrite -> 粘贴或远程订阅
# ==========================================================

[rewrite_local]

# ============ 成人论坛常用图床 ============

# === PixHost (修复: t[N].前缀可选) ===
^https?://(t(\d+)\.)?pixhost\.to/(thumbs|show)/(\d+)/(.+)$ url 302 https://img$2.pixhost.to/images/$4/$5

# === ImageTwist 家族 (仅保留 imgtwist + imgdrive, 移除 imgflare/imgfile/imgrock/imgbolt/zipero) ===
^https?://((?:img|s|cdn)\d*\.(?:imagetwist|imgdrive)\.(?:com|net|site))/th/(.+)$ url 302 https://$1/i/$2

# === PicState ===
^https?://picstate\.com/thumbs/small/(.+)$ url 302 https://picstate.com/files/$1

# === Pimpandhost / Filesor ===
^https?://(ist\d+-\d+\.filesor\.com/pimpandhost\.com/.+)_[ml]\.jpg$ url 302 https://$1.jpg

# === Pilot007 / ImageHost / ImgXClub ===
^https?://(pilot\d+|imagehost\d*|imgxclub)\.(org|cc|net|com)/images/(.+)\.th\.(jpg|png|jpeg)$ url 302 https://$1.$2/images/$3.$4

# === ImgTraffic ===
^https?://imgtraffic\.com/(\d+)s/(.+)$ url 302 https://imgtraffic.com/$1/$2

# === ImageVenue (cdn-thumbs - 去掉 _t/_thumb 后缀) ===
^https?://cdn-thumbs\.imagevenue\.com/(.+)_t\.(jpg|png|jpeg)$ url 302 https://cdn-images.imagevenue.com/$1.$2
^https?://cdn-thumbs\.imagevenue\.com/(.+)_thumb\.(jpg|png|jpeg)$ url 302 https://cdn-images.imagevenue.com/$1.$2

# === ImageVenue (imgN 子域名 - 去掉 _t/_thumb 后缀) ===
^https?://(img\d+\.imagevenue\.com/.+)_t\.(jpg|png|jpeg)$ url 302 https://$1.$2
^https?://(img\d+\.imagevenue\.com/.+)_thumb\.(jpg|png|jpeg)$ url 302 https://$1.$2

# === ImageVenue (cdn-images 缩略图 - 去掉 _t/_thumb 后缀) ===
^https?://cdn-images\.imagevenue\.com/(.+)_t\.(jpg|png|jpeg)$ url 302 https://cdn-images.imagevenue.com/$1.$2
^https?://cdn-images\.imagevenue\.com/(.+)_thumb\.(jpg|png|jpeg)$ url 302 https://cdn-images.imagevenue.com/$1.$2

# === ImageVenue (imagevenue.com 主站 - 去掉 _t/_thumb 后缀) ===
^https?://(?:www\.)?imagevenue\.com/(.+)_t\.(jpg|png|jpeg)$ url 302 https://imagevenue.com/$1.$2
^https?://(?:www\.)?imagevenue\.com/(.+)_thumb\.(jpg|png|jpeg)$ url 302 https://imagevenue.com/$1.$2

# ============ 通用/社交媒体图床 ============

# === Imgur ===
^https?://i\.imgur\.com/([a-zA-Z0-9]+)[slmth]\.(jpg|png|gif|jpeg)$ url 302 https://i.imgur.com/$1.$2

# === Reddit (i.redd.it) ===
^https?://preview\.redd\.it/(.+)$ url 302 https://i.redd.it/$1

# === Flickr ===
^https?://live\.staticflickr\.com/(\d+)/(\d+)_([a-z0-9]+)_[a-z]\.jpg$ url 302 https://live.staticflickr.com/$1/$2_$3_b.jpg

# === 500px ===
^https?://images\.500px\.org/(.+)/(.+)_[0-9]+\.jpg$ url 302 https://images.500px.org/$1/$2_1080.jpg

# === Unsplash ===
^https?://images\.unsplash\.com/(.+)\?w=\d+$ url 302 https://images.unsplash.com/$1?w=2000

# === Pexels ===
^https?://images\.pexels\.com/photos/(\d+)/(.+)\?auto=compress$ url 302 https://images.pexels.com/photos/$1/$2?auto=compress&w=1920

# === Pixabay ===
^https?://cdn\.pixabay\.com/photo/(.+)_150\.jpg$ url 302 https://cdn.pixabay.com/photo/$1_1280.jpg

# === Imgbox.com ===
^https?://imgbox\.com/(.+)_thumb\.jpg$ url 302 https://imgbox.com/$1.jpg

# ============ 云存储/CDN 图床 ============

# === Google Photos ===
^https?://lh3\.googleusercontent\.com/(.+)=w\d+$ url 302 https://lh3.googleusercontent.com/$1=w2000

# === OneDrive / SharePoint ===
^https?://.*\.sharepoint\.com/(.+)\?thumbnail=1$ url 302 https://$1

# === Dropbox ===
^https?://dl\.dropboxusercontent\.com/(.+)\?dl=0$ url 302 https://dl.dropboxusercontent.com/$1?dl=1

# === AWS S3 (修复: 移除无效的 ?x-amz-meta-thumbnail=true 条件,保留元数据参数) ===
^https?://(.+)\.s3\.amazonaws\.com/(.+)$ url 302 https://$1.s3.amazonaws.com/$2

# ============ 其他常见图床 ============

# === Catbox.moe ===
^https?://(?:files\.)?catbox\.moe/(.+)_thumb\.jpg$ url 302 https://catbox.moe/$1.jpg
^https?://(?:thumb|preview)\.catbox\.moe/(.+)\.jpg$ url 302 https://catbox.moe/$1.jpg

