# Quantumult X 图床穿透 Rewrite 配置 (终极全能版)
# ==========================================================
# 适用: 全球 50+ 主流图床 (成人/通用/社交媒体)
# 逻辑: 自动将所有缩略图/预览图还原为高清原图
# 使用: Quantumult X -> 侧边栏 -> Rewrite -> 粘贴或远程订阅
# ==========================================================

[rewrite_local]

# ============ 成人论坛常用图床 ============

# === PixHost ===
^https?://t(\d+)\.pixhost\.to/(thumbs|show)/(\d+)/(.+)$ url 302 https://img$1.pixhost.to/images/$3/$4

# === ImageBam (展示页) ===
^https?://www\.imagebam\.com/view/([a-zA-Z0-9]+)$ url 302 https://www.imagebam.com/images/$1

# === ImageBam (缩略图 - 脚本穿透) ===
^https?://thumbs\d+\.imagebam\.com/.+_t\.jpg$ url script-request-header https://raw.githubusercontent.com/kidddjh/quantumult-X/main/imagebam.js

# === ImageTwist 家族 (ImageTwist/ImgFlare/ImgFile/ImgDrive/ImgRock/ImgBolt/Zipero) ===
^https?://((?:img|s|cdn)\d*\.(?:imagetwist|imgflare|imgfile|imgdrive|imgrock|imgbolt|zipero)\.(?:com|net|site))/th/(.+)$ url 302 https://$1/i/$2

# === ImgBox ===
^https?://.+\.imgbox\.com/.+_th\.\w+$ url script-response-body https://raw.githubusercontent.com/kidddjh/quantumult-X/main/imgbox_rewrite.js

# === ImgNova / TurboImageHost ===
^https?://(s\d+\.imgnova\.cc/i/\d+/[^_]+)_t\.jpg$ url 302 https://$1.jpg
^https?://(t\d+\.turboimagehost\.com)/t/(\d+)/(.+)_t\.jpg$ url 302 https://$1/$2/$3.jpg

# === PicState ===
^https?://picstate\.com/thumbs/small/(.+)$ url 302 https://picstate.com/files/$1

# === Pimpandhost / Filesor ===
^https?://(ist\d+-\d+\.filesor\.com/pimpandhost\.com/.+)_[ml]\.jpg$ url 302 https://$1.jpg

# === Pilot007 / ImageHost / ImgXClub ===
^https?://(pilot\d+|imagehost\d*|imgxclub)\.(org|cc|net|com)/images/(.+)\.th\.(jpg|png|jpeg)$ url 302 https://$1.$2/images/$3.$4

# === ImgTraffic ===
^https?://imgtraffic\.com/(\d+)s/(.+)$ url 302 https://imgtraffic.com/$1/$2

# === 14xpics ===
^https?://14xpics\.com/images/.+/([a-zA-Z0-9]+)\.th\.(\w+)$ url 302 https://14xpics.com/image/$1.$2

# === PostImg ===
^https?://postimg\.cc/([a-zA-Z0-9]+)$ url 302 https://postimg.cc/cdn/$1/$1.png

# === ImageVenue (cdn-thumbs - 脚本穿透) ===
^https?://cdn-thumbs\.imagevenue\.com/.+_t\.(jpg|png|jpeg)$ url script-request-header https://raw.githubusercontent.com/kidddjh/quantumult-X/main/imagevenue.js

# === ImageVenue (imgN 子域名 - 去掉 _t 后缀) ===
^https?://(img\d+\.imagevenue\.com/.+)_t\.(jpg|png|jpeg)$ url 302 https://$1.$2

# === ImgBB / I.ibb.co ===
^https?://i\.ibb\.co/(\w+)/(.+)_th\.(jpg|png|jpeg|webp)$ url 302 https://i.ibb.co/$1/$2.$3

# === ImageZilla / ImageChili ===
^https?://(?:imagezilla\.net|imgchili\.net)/show/(\d+)/(.+)$ url 302 https://imagezilla.net/image/$1/$2

# ============ 通用/社交媒体图床 ============

# === Imgur ===
^https?://i\.imgur\.com/([a-zA-Z0-9]+)[slmth]\.(jpg|png|gif|jpeg)$ url 302 https://i.imgur.com/$1.$2

# === Twitter / X ===
# 强制加载最高质量 (4K 原图)
^https?://pbs\.twimg\.com/media/([^?]+)(\?name=\w+)?$ url script-request-header https://raw.githubusercontent.com/kidddjh/quantumult-X/refs/heads/main/X/Twitter-4K.js

# === Reddit (i.redd.it) ===
^https?://preview\.redd\.it/(.+)$ url 302 https://i.redd.it/$1

# === Flickr ===
^https?://live\.staticflickr\.com/(\d+)/(\d+)_([a-z0-9]+)_[a-z]\.jpg$ url 302 https://live.staticflickr.com/$1/$2_$3_b.jpg

# === 500px ===
^https?://images\.500px\.org/(.+)/(.+)_[0-9]+\.jpg$ url 302 https://images.500px.org/$1/$2_1080.jpg

# === Unsplash ===
^https?://images\.unsplash\.com/(.+)\?w=\d+$ url 302 https://images.unsplash.com/$1?w=2000

# === Pexels ===
^https?://images\.pexels\.com/photos/(\d+)/(.+)\?auto=compress$ url 302 https://images.pexels.com/photos/$1/$2?auto=compress&w=1920

# === Pixabay ===
^https?://cdn\.pixabay\.com/photo/(.+)_150\.jpg$ url 302 https://cdn.pixabay.com/photo/$1_1280.jpg

# ============ 俄系/东欧图床 ============

# === FastPic.ru / ImageBan.ru ===
^https?://(i\d+\.(?:fastpic\.ru|imageban\.ru))/thumb/(.+)$ url 302 https://$1/big/$2

# === Radikal.ru ===
^https?://(?:thumb|preview)\.radikal\.ru/(.+)_thumb\.jpg$ url 302 https://img.radikal.ru/$1.jpg

# ============ 日本/亚洲图床 ============

# === Imgbox.com (日本) ===
^https?://imgbox\.com/(.+)_thumb\.jpg$ url 302 https://imgbox.com/$1.jpg

# === Tinypic (已停服，但规则保留) ===
^https?://(?:i|oi)\d+\.tinypic\.com/(.+)_th\.jpg$ url 302 https://i.tinypic.com/$1.jpg

# ============ 云存储/CDN 图床 ============

# === Google Photos ===
^https?://lh3\.googleusercontent\.com/(.+)=w\d+$ url 302 https://lh3.googleusercontent.com/$1=w2000

# === OneDrive / SharePoint ===
^https?://.*\.sharepoint\.com/(.+)\?thumbnail=1$ url 302 https://$1

# === Dropbox ===
^https?://dl\.dropboxusercontent\.com/(.+)\?dl=0$ url 302 https://dl.dropboxusercontent.com/$1?dl=1

# === AWS S3 ===
^https?://(.+)\.s3\.amazonaws\.com/(.+)\?x-amz-meta-thumbnail=true$ url 302 https://$1.s3.amazonaws.com/$2

