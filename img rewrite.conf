# Quantumult X 图床穿透 Rewrite 配置
# ================================
# 适用: PixHost / ImageBam / 14xpics / PostImg / ImgBox
# 使用: Quantumult X → 侧边栏 → Rewrite → 粘贴或远程订阅
# ================================

[rewrite_local]

# === PixHost ===
^https?://t(\d+)\.pixhost\.to/(thumbs|show)/(\d+)/(.+)$ url 302 https://img$1.pixhost.to/images/$3/$4

# === ImageBam ===
^https?://www\.imagebam\.com/view/([a-zA-Z0-9]+)$ url 302 https://www.imagebam.com/images/$1

# === 14xpics ===
^https?://14xpics\.com/images/.+/([a-zA-Z0-9]+)\.th\.(\w+)$ url 302 https://14xpics.com/image/$1.$2

# === PostImg ===
^https?://postimg\.cc/([a-zA-Z0-9]+)$ url 302 https://postimg.cc/cdn/$1/$1.png

# === ImgNova ===
^https?://imgnova\.cc/images/(.+)_t\.jpg$ url 302 https://imgnova.cc/images/$1.jpg

# === ImgBox ===
^https?://.+\.imgbox\.com/.+_th\.\w+$ url script-response-body https://raw.githubusercontent.com/kidddjh/quantumult-X/main/imgbox_rewrite.js

[mitm]
hostname = *.pixhost.to, www.imagebam.com, 14xpics.com, *.imgbox.com, postimg.cc, *.postimg.cc, imgnova.cc
