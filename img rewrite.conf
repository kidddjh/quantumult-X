# Quantumult X 图床穿透 Rewrite 配置
# ================================
# 适用: PixHost / ImageBam / 14xpics / PostImg / ImgNova / ImgBox
# 使用: Quantumult X → 侧边栏 → Rewrite → 粘贴或远程订阅
# ================================

[rewrite_local]

# === PixHost ===
^https?://t(\d+)\.pixhost\.to/(thumbs|show)/(\d+)/(.+)$ url 302 https://img$1.pixhost.to/images/$3/$4

# === ImageBam ===
^https?://www\.imagebam\.com/view/([a-zA-Z0-9]+)$ url 302 https://www.imagebam.com/images/$1

# === 14xpics ===
^https?://14xpics\.com/images/.+/([a-zA-Z0-9]+)\.th\.(\w+)$ url 302 https://14xpics.com/image/$1.$2

# === PostImg ===
^https?://postimg\.cc/([a-zA-Z0-9]+)$ url 302 https://postimg.cc/cdn/$1/$1.png

# === ImgNova (imgnova.cc) ===
# 缩略图: https://s1.imgnova.cc/i/00677/xie0wyoc9npg_t.jpg → 原图: https://s1.imgnova.cc/i/00677/xie0wyoc9npg.jpg
^https?://(s\d+\.imgnova\.cc/i/\d+/[^_]+)_t\.jpg$ url 302 https://$1.jpg

# === ImgBox ===
^https?://.+\.imgbox\.com/.+_th\.\w+$ url script-response-body https://raw.githubusercontent.com/kidddjh/quantumult-X/main/imgbox_rewrite.js

# === PicState ===
# 缩略图: https://picstate.com/thumbs/small/13707194_xkror/0256am.jpg → 原图: https://picstate.com/files/13707194_xkror/0256am.jpg
^https?://picstate\.com/thumbs/small/(.+)$ url 302 https://picstate.com/files/$1

# === ImageTwist ===
# 缩略图: https://img202.imagetwist.com/th/76808/ylihvwzb61ts.jpg → 原图: https://img202.imagetwist.com/i/76808/ylihvwzb61ts.jpg
^https?://((?:img|s)\d+\.imagetwist\.com)/th/(.+)$ url 302 https://$1/i/$2

# === Pimpandhost / Filesor ===
# 缩略图: .../file_m.jpg 或 .../file_l.jpg → 原图: .../file.jpg
^https?://(ist\d+-\d+\.filesor\.com/pimpandhost\.com/.+)_[ml]\.jpg$ url 302 https://$1.jpg

# === Pilot007 / ImageHost ===
# 缩略图: https://pilot007.org/images/2026/05/13/file.th.jpg → 原图: https://pilot007.org/images/2026/05/13/file.jpg
^https?://(pilot\d+|imagehost\d*)\.(org|cc|net)/images/(.+)\.th\.(jpg|png|jpeg)$ url 302 https://$1.$2/images/$3.$4

[mitm]
hostname = *.pixhost.to, www.imagebam.com, 14xpics.com, *.imgbox.com, postimg.cc, *.postimg.cc, *.imgnova.cc, imgnova.cc, picstate.com, *.filesor.com, *.imagetwist.com, pilot007.org, *.pilot007.org
