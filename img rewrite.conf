# Quantumult X 图床穿透 Rewrite 配置（修正版）
# ================================
# 适用: PixHost / ImageBam / ImageTwist家族 / ImgBox / 14xpics 等 50+ 图床
# 使用: Quantumult X → 侧边栏 → Rewrite → 粘贴或远程订阅
# JS脚本: imagebam.js / imgbox_rewrite.js 需保存到本地 Scripts 目录
# ================================
# 更新: 2026-05-18
# 修正内容:
#   • ImageBam: script-request-header → script-response-body
#   • imagebam.js: 修复引号语法错误
#   • hostname: 修正所有中间/结尾通配符为合法写法
# ================================

[rewrite_local]

# === PixHost ===
^https?://t(\d+)\.pixhost\.to/(thumbs|show)/(\d+)/(.+)$ url 302 https://img$1.pixhost.to/images/$3/$4

# === ImageBam (展示页) ===
^https?://www\.imagebam\.com/view/([a-zA-Z0-9]+)$ url 302 https://www.imagebam.com/images/$1

# === ImageBam (缩略图 - 脚本穿透) ===
^https?://thumbs\d+\.imagebam\.com/.+_t\.jpg$ url script-response-body https://raw.githubusercontent.com/kidddjh/quantumult-X/main/imagebam.js

# === ImageTwist 家族 ===
^https?://((?:img|s|cdn)\d*\.(?:imagetwist|imgflare|imgfile|imgdrive|imgrock|imgbolt|zipero)\.(?:com|net|site))/th/(.+)$ url 302 https://$1/i/$2

# === ImgBox ===
^https?://.+\.imgbox\.com/.+_th\.\w+$ url script-response-body https://raw.githubusercontent.com/kidddjh/quantumult-X/main/imgbox_rewrite.js

# === ImgNova / TurboImageHost ===
