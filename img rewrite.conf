# Quantumult X 图床穿透 Rewrite 配置 (全能版)
# ==========================================================
# 适用: PixHost / ImageBam / ImageTwist / ImgBox / Imgur / Twitter / FastPic
#       ImgNova / PostImg / 14xpics / PicState / Filesor / Pilot007 / ImgTraffic
#       TurboImageHost / ImgBB / ImageBan / ImageVenue / ImgFlare 等 20+ 图床
# 使用: Quantumult X -> 侧边栏 -> Rewrite -> 粘贴或远程订阅
# ==========================================================

[rewrite_local]

# === PixHost ===
^https?://t(\d+)\.pixhost\.to/(thumbs|show)/(\d+)/(.+)$ url 302 https://img$1.pixhost.to/images/$3/$4

# === ImageBam ===
# 展示页: www.imagebam.com/view/ID → www.imagebam.com/images/ID
^https?://www\.imagebam\.com/view/([a-zA-Z0-9]+)$ url 302 https://www.imagebam.com/images/$1

# 缩略图: thumbsN.imagebam.com/路径/ID_t.jpg → 脚本穿透 (提取 ID 后重定向)
^https?://thumbs\d+\.imagebam\.com/.+_t\.jpg$ url script-request-header https://raw.githubusercontent.com/kidddjh/quantumult-X/refs/heads/main/imagebam.js

# === ImageTwist / ImgFlare / ImgFile / ImgDrive / ImgRock / ImgBolt / Zipero ===
# 逻辑：/th/ -> /i/
^https?://((?:img|s|cdn)\d*\.(?:imagetwist|imgflare|imgfile|imgdrive|imgrock|imgbolt|zipero)\.(?:com|net|site))/th/(.+)$ url 302 https://$1/i/$2

# === ImgBox ===
^https?://.+\.imgbox\.com/.+_th\.\w+$ url script-response-body https://raw.githubusercontent.com/kidddjh/quantumult-X/main/imgbox_rewrite.js

# === Imgur ===
^https?://i\.imgur\.com/([a-zA-Z0-9]+)[slmth]\.(jpg|png|gif|jpeg)$ url 302 https://i.imgur.com/$1.$2

# === Twitter / X ===
^https?://pbs\.twimg\.com/media/([^?]+)\?name=\w+$ url 302 https://pbs.twimg.com/media/$1?name=orig

# === FastPic / ImageBan (俄系) ===
# 逻辑：/thumb/ -> /big/ 或 /view/ -> /out.php?i=
^https?://(i\d+\.(?:fastpic\.ru|imageban\.ru))/thumb/(.+)$ url 302 https://$1/big/$2

# === ImgNova / TurboImageHost / Turboimg ===
# 逻辑：域名/t/路径/文件_t.jpg -> 域名/路径/文件.jpg
^https?://(t\d+\.turboimagehost\.com)/t/(\d+)/(.+)_t\.jpg$ url 302 https://$1/$2/$3.jpg
^https?://(s\d+\.imgnova\.cc/i/\d+/[^_]+)_t\.jpg$ url 302 https://$1.jpg

# === PostImg ===
^https?://postimg\.cc/([a-zA-Z0-9]+)$ url 302 https://postimg.cc/cdn/$1/$1.png

# === 14xpics ===
^https?://14xpics\.com/images/.+/([a-zA-Z0-9]+)\.th\.(\w+)$ url 302 https://14xpics.com/image/$1.$2

# === PicState ===
^https?://picstate\.com/thumbs/small/(.+)$ url 302 https://picstate.com/files/$1

# === Pimpandhost / Filesor ===
^https?://(ist\d+-\d+\.filesor\.com/pimpandhost\.com/.+)_[ml]\.jpg$ url 302 https://$1.jpg

# === Pilot007 / ImageHost / ImageXClub ===
^https?://(pilot\d+|imagehost\d*|imgxclub)\.(org|cc|net|com)/images/(.+)\.th\.(jpg|png|jpeg)$ url 302 https://$1.$2/images/$3.$4

# === ImgTraffic ===
^https?://imgtraffic\.com/(\d+)s/(.+)$ url 302 https://imgtraffic.com/$1/$2

# === ImgBB / I.ibb.co ===
^https?://i\.ibb\.co/(\w+)/(.+)_th\.(jpg|png|jpeg|webp)$ url 302 https://i.ibb.co/$1/$2.$3

# === ImageZilla / ImageChili ===
^https?://(?:imagezilla\.net|imgchili\.net)/show/(\d+)/(.+)$ url 302 https://imagezilla.net/image/$1/$2

# === ImageVenue (脚本穿透版) ===
# 逻辑：转换域名/后缀 + 伪造 Referer 绕过防盗链
^https?://cdn-thumbs\.imagevenue\.com/.+_t\.(jpg|png|jpeg)$ url script-request-header https://raw.githubusercontent.com/kidddjh/quantumult-X/refs/heads/main/imagevenue.js

[mitm]
hostname = *.pixhost.to, www.imagebam.com, 14xpics.com, *.imgbox.com, postimg.cc, *.postimg.cc, *.imgnova.cc, imgnova.cc, picstate.com, *.filesor.com, *.imagetwist.com, pilot007.org, *.pilot007.org, imgtraffic.com, i.imgur.com, pbs.twimg.com, *.fastpic.ru, *.imageban.ru, *.turboimagehost.com, imgflare.com, imgfile.net, imgdrive.net, imgrock.net, imgbolt.com, *.zipero.site, i.ibb.co, *.imgbb.com, imagezilla.net, cdn-thumbs.imagevenue.com, cdn-images.imagevenue.com
