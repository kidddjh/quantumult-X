# ============================================================
# Quantumult X — img_rewrite.conf
# 图床穿透：302/307 正则捕获组路径替换
# 语法格式（rewrite_local）:
#   ^URL_REGEX$, TYPE, https://target.domain/path/$1
#
# 语法格式（rewrite_remote）:
#   hostname, url-regex, TYPE
#
# 正则说明:  ^ 开头, $ 结尾, \. 转义点, () 捕获, $1/$2 引用
# 生成时间: 2026-04-21
# ============================================================

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. imgtraffic.com — /1s/ → /1/
#    匹配: https://imgtraffic.com/xxx/1s/xxx → /1/
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
hostname = imgtraffic.com
^https?:\/\/imgtraffic\.com\/.*\/1s\/(.*)$, 302, https://imgtraffic.com/$1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 2. Pixhost.to — t2.pixhost.to → img2.pixhost.to
#    /thumbs/ → /images/     /show/ → /images/
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
hostname = pixhost.to
^https?:\/\/t2\.pixhost\.to\/thumbs\/(\d+)\/(.*)$, 302, https://img2.pixhost.to/images/$1/$2
^https?:\/\/t2\.pixhost\.to\/show\/(\d+)\/(.*)$, 302, https://img2.pixhost.to/images/$1/$2

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 3. (已放弃) 14xpics.space
#    原因: 需要二次请求提取 og:image，QX 302 无法实现
#    当前策略: 不做穿透，直接使用原始缩略图 URL
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 4. xxxwebdlxxx.top — /upload/small/ → /upload/big/
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
hostname = xxxwebdlxxx.top
^https?:\/\/xxxwebdlxxx\.top\/upload\/small\/(.*)$, 302, https://xxxwebdlxxx.top/upload/big/$1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 5. xxxwebdlxxx.org — /upload/small/ → /upload/big/
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
hostname = xxxwebdlxxx.org
^https?:\/\/xxxwebdlxxx\.org\/upload\/small\/(.*)$, 302, https://xxxwebdlxxx.org/upload/big/$1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 6. imgxclub.com — /ps/ → /p/
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
hostname = imgxclub.com
^https?:\/\/imgxclub\.com\/ps\/(.*)$, 302, https://imgxclub.com/p/$1

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 7. pilot007.org — .th. 移除
#    例: /images/xxx.th.jpg → /images/xxx.jpg
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
hostname = pilot007.org
^https?:\/\/pilot007\.org\/(.*)\.th\.(jpg|png|jpeg|gif)$, 302, https://pilot007.org/$1.$2

# ============================================================
# 汇总对照表（g_orig → QX rewrite）
# ┌────────────────┬──────────────────┬──────────────────────┬──────────────────────────────┐
# │ 域名            │ g_orig 规则       │ QX 正则捕获           │ 302 目标                      │
# ├────────────────┼──────────────────┼──────────────────────┼──────────────────────────────┤
# │ imgtraffic.com │ /1s/ → /1/       │ \/1s\/(.*)           │ /1/$1                        │
# │ pixhost.to     │ t2→img2 + thumbs │ t2\.pix.*\/thumbs\/  │ img2.pixhost.to/images/      │
# │ 14xpics.space  │ — 已放弃穿透       │ —                    │ —                            │
# │ xxxwebdlxxx.top│ /small/ → /big/  │ \/upload\/small\/     │ /upload/big/$1               │
# │ xxxwebdlxxx.org│ /small/ → /big/  │ \/upload\/small\/     │ /upload/big/$1               │
# │ imgxclub.com   │ /ps/ → /p/       │ \/ps\/(.*)            │ /p/$1                        │
# │ pilot007.org    │ .th. 去除         │ \.th\.(jpg|png...)   │ 去除 .th.，保留扩展名          │
# └────────────────┴──────────────────┴──────────────────────┴──────────────────────────────┘
# ============================================================
