#[rewrite_local]

# === imgnova.cc 缩略图穿透 ===
# ImgNova 穿透规则：移除 _t 后缀获取 1080p/4K 原始大图
^https?://s\d+\.imgnova\.cc/i/(\d+)/(.+)_t\.jpg url 302 https://s1.imgnova.cc/i/$1/$2.jpg

#[mitm]
hostname = s*.imgnova.cc

