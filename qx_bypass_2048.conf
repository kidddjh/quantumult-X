^https:\/\/0rsh\.zskmqt\.com\/read\.php\?tid=\d+ url script-response-body qx_bypass_2048.js

#; 请求脚本: 自动注入 _safe Cookie（所有后续请求永久生效）
^https:\/\/0rsh\.zskmqt\.com\/read\.php\?tid=\d+ url script-request-header qx_bypass_2048.js

#[mitm]
hostname = %APPEND% 0rsh.zskmqt.com
