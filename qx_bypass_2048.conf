# ============================================================
# Quantumult X 配置 — 2048 论坛 JS 反爬永久绕过
# 目标: https://0rsh.zskmqt.com/*（人人为我论坛）
# 
# 使用方法:
#   1. 将 qx_bypass_2048.js 放入 Quantumult X Scripts 目录
